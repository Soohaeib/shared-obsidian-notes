<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" style="width: 100%; max-width: 650px; height: auto; display: block; margin: 0 auto; background: transparent; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow-solow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <line x1="60" y1="300" x2="60" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-solow)" />
  <line x1="60" y1="300" x2="600" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-solow)" />

<text x="35" y="45" fill="#f8fafc" font-size="14" font-weight="500" transform="rotate(-90,35,45)" text-anchor="end">Investment, sf(k)</text> <text x="590" y="325" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="end">Capital per worker (k)</text>

  <path d="M 60 300 Q 220 110 560 100" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" />
  <text x="570" y="105" fill="#22c55e" font-size="13" font-weight="600">sf(k)</text>

  <line x1="60" y1="300" x2="520" y2="66" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <text x="490" y="55" fill="#94a3b8" font-size="12">(n1 + δ)k (Old break-even)</text>

  <line x1="60" y1="300" x2="380" y2="74" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />
  <text x="340" y="60" fill="#f59e0b" font-size="12" font-weight="600">(n2 + δ)k (New break-even)</text>

  <circle cx="431" cy="111" r="4.5" fill="#f8fafc" />
  <line x1="431" y1="111" x2="431" y2="300" stroke="#475569" stroke-width="1.5" stroke-dasharray="4" />
  <text x="431" y="318" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">k1*</text>

  <circle cx="265" cy="155" r="4.5" fill="#f59e0b" />
  <line x1="265" y1="155" x2="265" y2="300" stroke="#475569" stroke-width="1.5" stroke-dasharray="4" />
  <text x="265" y="318" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">k2*</text>
</svg>
