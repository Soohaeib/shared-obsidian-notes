<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" style="width: 100%; max-width: 650px; height: auto; display: block; margin: 0 auto; background: transparent; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow-kuznets" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <line x1="60" y1="300" x2="60" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-kuznets)" />
  <line x1="60" y1="300" x2="600" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-kuznets)" />

<text x="35" y="45" fill="#f8fafc" font-size="14" font-weight="500" transform="rotate(-90,35,45)" text-anchor="end">Income Inequality</text> <text x="590" y="325" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="end">Per Capita Income (Development)</text>

  <path d="M 120 280 Q 330 60 540 280" fill="none" stroke="#a855f7" stroke-width="3.5" stroke-linecap="round" />

  <circle cx="330" cy="170" r="5" fill="#f8fafc" stroke="#a855f7" stroke-width="2" />
  <line x1="330" y1="170" x2="330" y2="300" stroke="#475569" stroke-width="1.5" stroke-dasharray="4" />

<text x="330" y="150" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="middle">Turning Point (Peak)</text> <text x="180" y="180" fill="#94a3b8" font-size="12" text-anchor="middle">Early Stage: Inequality Rises</text> <text x="480" y="180" fill="#94a3b8" font-size="12" text-anchor="middle">Advanced Stage: Inequality Falls</text> </svg>
