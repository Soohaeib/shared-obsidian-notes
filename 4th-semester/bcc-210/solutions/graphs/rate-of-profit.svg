<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" style="width: 100%; max-width: 650px; height: auto; display: block; margin: 0 auto; background: transparent; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow-profit" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <line x1="60" y1="300" x2="60" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-profit)" />
  <line x1="60" y1="300" x2="600" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-profit)" />

<text x="35" y="45" fill="#f8fafc" font-size="14" font-weight="500" transform="rotate(-90,35,45)" text-anchor="end">Rate of Profit (p)</text> <text x="590" y="325" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="end">Time / Capital Accumulation (c/v)</text>

  <line x1="100" y1="90" x2="360" y2="230" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" />
  <line x1="360" y1="230" x2="560" y2="230" stroke="#ef4444" stroke-width="3.5" stroke-dasharray="5" stroke-linecap="round" />

  <circle cx="100" cy="90" r="4.5" fill="#f8fafc" />
  <circle cx="230" cy="160" r="4.5" fill="#f8fafc" />
  <circle cx="360" cy="230" r="4.5" fill="#ef4444" />

<text x="85" y="95" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="end">p1</text> <text x="245" y="150" fill="#94a3b8" font-size="12" font-weight="500">p2</text> <text x="245" y="167" fill="#94a3b8" font-size="12">Long-Run Trend of Declining Profitability</text> <text x="375" y="225" fill="#ef4444" font-size="13" font-weight="600">p3 ───> Crisis / Systemic Collapse Point</text> </svg>
